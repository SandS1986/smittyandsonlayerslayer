<section class="section">
    <h2>Pricing Calculator</h2>
    <form onsubmit="event.preventDefault(); calculatePrice();">
        <label>Material Type</label>
        <select id="material" required>
            <option value="0.10">PLA – $0.10 per gram</option>
            <option value="0.15">PETG – $0.15 per gram</option>
            <option value="0.20">ABS – $0.20 per gram</option>
            <option value="0.25">Resin – $0.25 per gram</option>
        </select>

        <label>Print Weight (grams)</label>
        <input type="number" id="weight" placeholder="e.g., 50" required>

        <label>Print Time (hours)</label>
        <input type="number" id="hours" placeholder="e.g., 3" required>

        <button type="submit">Calculate Price</button>
        <h3 id="result" style="margin-top:15px;"></h3>
    </form>
</section>
